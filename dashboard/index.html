<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto AI Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0f; }
    .card { background: #12121a; border: 1px solid #1e1e2e; }
    .log-line { font-size: 0.72rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #12121a; }
    ::-webkit-scrollbar-thumb { background: #2e2e4e; border-radius: 2px; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body class="text-gray-200 min-h-screen font-mono">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header style="background:#0d0d18;border-bottom:1px solid #1e1e2e" class="px-6 py-4 sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🤖</span>
        <span class="text-white font-bold text-lg tracking-tight">Crypto AI Trading</span>
      </div>
      <div class="flex items-center gap-3 text-sm flex-wrap justify-end">
        <span id="hdr-mode"  class="px-3 py-1 rounded-full bg-blue-950 text-blue-300 text-xs font-medium">—</span>
        <span id="hdr-dry"   class="px-3 py-1 rounded-full text-xs font-medium">—</span>
        <span id="hdr-bal"   class="text-green-400 font-bold text-base">$—</span>
        <span id="hdr-time"  class="text-gray-600 text-xs hidden sm:block">—</span>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="max-w-screen-2xl mx-auto px-4 py-5 space-y-5">

    <!-- Stats Bar -->
    <div id="stats-bar" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3"></div>

    <!-- Open Positions -->
    <section>
      <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-3">📊 Open Positions</h2>
      <div id="positions" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <div class="card rounded-xl p-5 text-center text-gray-600 text-sm">Loading…</div>
      </div>
    </section>

    <!-- Trades + Config -->
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-5">

      <!-- Recent Trades -->
      <section class="xl:col-span-2">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-3">📈 Recent Trades</h2>
        <div class="card rounded-xl overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr style="background:#16162a">
                <th class="px-4 py-3 text-left text-gray-500 font-medium">Time</th>
                <th class="px-4 py-3 text-left text-gray-500 font-medium">Pair</th>
                <th class="px-4 py-3 text-right text-gray-500 font-medium">Entry</th>
                <th class="px-4 py-3 text-right text-gray-500 font-medium">Exit</th>
                <th class="px-4 py-3 text-right text-gray-500 font-medium">PnL</th>
                <th class="px-4 py-3 text-left text-gray-500 font-medium">Status</th>
              </tr>
            </thead>
            <tbody id="trades-tbody">
              <tr><td colspan="6" class="px-4 py-6 text-center text-gray-600">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Config Panel -->
      <section>
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-3">⚙️ Config</h2>
        <div id="cfg-panel" class="card rounded-xl p-4 space-y-3 text-sm">
          <div class="text-gray-600">Loading…</div>
        </div>
      </section>
    </div>

    <!-- Live Logs -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest">🖥 Live Logs</h2>
        <div class="flex items-center gap-2">
          <span id="ws-badge" class="text-xs px-2 py-1 rounded-full bg-red-950 text-red-400">● Disconnected</span>
          <button onclick="clearLogs()"
            class="text-xs px-3 py-1 rounded card hover:bg-gray-800 text-gray-400 transition-colors">Clear</button>
        </div>
      </div>
      <div id="log-box"
        class="card rounded-xl p-4 h-72 overflow-y-auto space-y-0.5">
      </div>
    </section>

  </main>

  <script>
  // ════════════════════════════════════════════════════════
  //  DATA FETCH
  // ════════════════════════════════════════════════════════
  let lastCfg = {};

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      if (!r.ok) return;
      const d = await r.json();
      lastCfg = d.cfg || {};
      renderHeader(d);
      renderStats(d);
      renderPositions(d.positions || [], d.open_trades || [], d.prices || {});
      renderTrades(d.recent_trades || []);
      renderConfig(d.cfg || {});
      document.getElementById('hdr-time').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch(e) { /* ignore */ }
  }

  // ════════════════════════════════════════════════════════
  //  HEADER
  // ════════════════════════════════════════════════════════
  function renderHeader(d) {
    const cfg = d.cfg || {};
    document.getElementById('hdr-mode').textContent =
      `${(cfg.trade_mode || 'spot').toUpperCase()} ${cfg.leverage || 1}x`;
    const dry = document.getElementById('hdr-dry');
    if (cfg.dry_run) {
      dry.textContent = '🧪 DRY RUN';
      dry.className = 'px-3 py-1 rounded-full bg-yellow-950 text-yellow-400 text-xs font-medium';
    } else {
      dry.textContent = '🔴 LIVE';
      dry.className = 'px-3 py-1 rounded-full bg-red-950 text-red-400 text-xs font-medium pulse';
    }
    document.getElementById('hdr-bal').textContent =
      '$' + (d.balance || 0).toFixed(4) + ' USDT';
    document.getElementById('hdr-time').classList.remove('hidden');
  }

  // ════════════════════════════════════════════════════════
  //  STATS BAR
  // ════════════════════════════════════════════════════════
  function renderStats(d) {
    const s   = d.stats  || {};
    const bal = d.balance || 0;
    const mu  = d.margin_used || 0;
    const unr = d.total_unrealized || 0;
    const unrUp  = unr >= 0;
    const todUp  = (s.today_pnl || 0) >= 0;
    const totUp  = (s.total_pnl || 0) >= 0;

    function statCard(label, value, subValue, color) {
      return `<div class="card rounded-xl px-4 py-3">
        <div class="text-gray-500 text-xs mb-1">${label}</div>
        <div class="font-bold text-sm" style="color:${color}">${value}</div>
        ${subValue ? `<div class="text-gray-600 text-xs mt-0.5">${subValue}</div>` : ''}
      </div>`;
    }

    document.getElementById('stats-bar').innerHTML = [
      statCard('Free Balance',    '$' + bal.toFixed(4) + ' USDT',   null, '#e5e7eb'),
      statCard('Margin In Use',   '$' + mu.toFixed(4)  + ' USDT',   null, '#93c5fd'),
      statCard('Unrealized PnL',  (unrUp?'+':'') + '$' + unr.toFixed(4), null, unrUp ? '#22c55e' : '#ef4444'),
      statCard("Today's PnL",     (todUp?'+':'') + (s.today_pnl||0).toFixed(2) + '%', null, todUp ? '#22c55e' : '#ef4444'),
      statCard('Total PnL',       (totUp?'+':'') + (s.total_pnl||0).toFixed(2) + '%', null, totUp ? '#22c55e' : '#ef4444'),
      statCard('Win Rate',        (s.win_rate||0).toFixed(1) + '%', `${s.wins||0}W / ${s.losses||0}L of ${s.total_trades||0}`, (s.win_rate||0) >= 50 ? '#22c55e' : '#f59e0b'),
    ].join('');
  }

  // ════════════════════════════════════════════════════════
  //  POSITIONS
  // ════════════════════════════════════════════════════════
  function renderPositions(live, dbTrades, prices) {
    const el = document.getElementById('positions');

    // Live Binance positions
    const liveCards = live.map(pos => {
      const db = dbTrades.find(t => t.pair === pos.pair && !t.is_dry_run) || {};
      const tp  = db.take_profit_price || 0;
      const sl  = db.stop_loss_price   || 0;
      const up  = pos.pnl_pct >= 0;
      const col = up ? '#22c55e' : '#ef4444';
      const border = up ? 'border-green-900' : 'border-red-900';
      return `
      <div class="card rounded-xl p-5 border ${border}">
        <div class="flex items-start justify-between mb-4">
          <div>
            <div class="flex items-center gap-2">
              <span class="text-white font-bold text-base">${pos.pair}</span>
              <span class="text-xs px-2 py-0.5 rounded-full bg-blue-950 text-blue-300">
                LONG ${pos.leverage}x
              </span>
            </div>
            <div class="text-gray-500 text-xs mt-0.5">${pos.qty} contracts</div>
          </div>
          <div class="text-right">
            <div class="font-bold text-xl" style="color:${col}">
              ${up?'+':''}${pos.pnl_pct}%
            </div>
            <div class="text-xs" style="color:${col}">
              ${pos.unrealized_pnl >= 0?'+':''}$${pos.unrealized_pnl}
            </div>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-4 text-xs">
          <div style="background:#1a1a28;border-radius:8px;padding:8px">
            <div class="text-gray-500 mb-0.5">Entry</div>
            <div class="text-white font-medium">${fmt(pos.entry)}</div>
          </div>
          <div style="background:#1a1a28;border-radius:8px;padding:8px">
            <div class="text-gray-500 mb-0.5">Mark</div>
            <div class="text-white font-medium">${fmt(pos.mark)}</div>
          </div>
          <div style="background:#1a1a28;border-radius:8px;padding:8px">
            <div class="text-gray-500 mb-0.5">TP / SL</div>
            <div class="text-green-400">${tp ? fmt(tp) : 'N/A'}</div>
            <div class="text-red-400">${sl ? fmt(sl) : 'N/A'}</div>
          </div>
        </div>
        <button onclick="closePosition('${pos.pair}')"
          class="w-full py-2 rounded-lg text-sm font-medium transition-colors"
          style="background:#3f0f0f;color:#f87171;border:1px solid #7f1d1d"
          onmouseover="this.style.background='#5f1414'"
          onmouseout="this.style.background='#3f0f0f'">
          ✕ Close Position
        </button>
      </div>`;
    });

    // Dry-run open positions from DB — enhanced with live price
    const dryCards = dbTrades
      .filter(t => t.is_dry_run)
      .map(t => {
        const entry  = parseFloat(t.entry_price || 0);
        const tp     = parseFloat(t.take_profit_price || 0);
        const sl     = parseFloat(t.stop_loss_price   || 0);
        const lev    = lastCfg.leverage || 1;
        const cur    = (prices || {})[t.pair] || 0;
        const hasPx  = cur > 0 && entry > 0;
        const pnlPct = hasPx ? (cur - entry) / entry * 100 * lev : null;
        const up     = pnlPct >= 0;
        const col    = pnlPct === null ? '#9ca3af' : up ? '#22c55e' : '#ef4444';
        const bord   = pnlPct === null ? 'border-yellow-900' : up ? 'border-green-900' : 'border-red-900';
        const usdtAmt = parseFloat(t.usdt_value || 0);
        const pnlUsdt = (pnlPct !== null && usdtAmt) ? (pnlPct / 100) * usdtAmt : null;
        const pnlHtml = pnlPct !== null
          ? `<div class="font-bold text-lg" style="color:${col}">${up?'+':''}${pnlPct.toFixed(2)}%</div>
             <div class="text-xs mt-0.5" style="color:${col}">${pnlUsdt !== null ? (pnlUsdt >= 0?'+':'-') + '$' + Math.abs(pnlUsdt).toFixed(4) : ''}</div>`
          : `<div class="text-yellow-400 text-xs font-bold">DRY RUN</div>`;
        return `
        <div class="card rounded-xl p-5 border ${bord}">
          <div class="flex items-start justify-between mb-3">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-white font-bold text-base">${t.pair}</span>
                <span class="text-xs px-2 py-0.5 rounded-full bg-yellow-950 text-yellow-400">DRY</span>
              </div>
            </div>
            <div class="text-right">${pnlHtml}</div>
          </div>
          <div class="grid grid-cols-3 gap-2 mb-4 text-xs">
            <div style="background:#1a1a28;border-radius:8px;padding:8px">
              <div class="text-gray-500 mb-0.5">Entry</div>
              <div class="text-white font-medium">${fmt(entry)}</div>
            </div>
            <div style="background:#1a1a28;border-radius:8px;padding:8px">
              <div class="text-gray-500 mb-0.5">Now</div>
              <div class="font-medium" style="color:${col}">${cur ? fmt(cur) : '…'}</div>
            </div>
            <div style="background:#1a1a28;border-radius:8px;padding:8px">
              <div class="text-gray-500 mb-0.5">TP / SL</div>
              <div class="text-green-400">${fmt(tp)}</div>
              <div class="text-red-400">${fmt(sl)}</div>
            </div>
          </div>
          <button onclick="cancelDry('${t.id}')"
            class="w-full py-2 rounded-lg text-xs font-medium"
            style="background:#2a1f00;color:#fbbf24;border:1px solid #78350f"
            onmouseover="this.style.background='#3a2a00'"
            onmouseout="this.style.background='#2a1f00'">
            ✕ Cancel Dry Trade
          </button>
        </div>`;
      });

    const all = [...liveCards, ...dryCards];
    el.innerHTML = all.length
      ? all.join('')
      : `<div class="card rounded-xl p-6 text-center text-gray-600 col-span-full text-sm">
           No open positions
         </div>`;
  }

  // ════════════════════════════════════════════════════════
  //  TRADES TABLE
  // ════════════════════════════════════════════════════════
  function renderTrades(trades) {
    const tbody = document.getElementById('trades-tbody');
    if (!trades.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-600">No trades yet</td></tr>';
      return;
    }
    tbody.innerHTML = trades.map(t => {
      const pnl = parseFloat(t.pnl_pct || 0);
      const pnlTxt = pnl !== 0
        ? `<span class="${pnl>0?'text-green-400':'text-red-400'} font-medium">${pnl>0?'+':''}${pnl.toFixed(2)}%</span>`
        : '<span class="text-gray-600">—</span>';
      const exitTxt = t.actual_exit_price
        ? fmt(t.actual_exit_price)
        : '<span class="text-gray-600">—</span>';
      const badge = outcomeTag(t.outcome);
      const dry = t.is_dry_run
        ? '<span class="text-yellow-700 mr-1">dry</span>' : '';
      const time = t.created_at
        ? new Date(t.created_at).toLocaleString([],
            {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
        : '';
      return `<tr style="border-top:1px solid #1e1e2e" class="hover:bg-white/[0.02] transition-colors">
        <td class="px-4 py-3 text-gray-500">${time}</td>
        <td class="px-4 py-3">${dry}<span class="text-gray-200">${t.pair}</span></td>
        <td class="px-4 py-3 text-right text-gray-300">${fmt(t.entry_price)}</td>
        <td class="px-4 py-3 text-right">${exitTxt}</td>
        <td class="px-4 py-3 text-right">${pnlTxt}</td>
        <td class="px-4 py-3">${badge}</td>
      </tr>`;
    }).join('');
  }

  function outcomeTag(o) {
    const map = {
      win:          'bg-green-950 text-green-400',
      loss:         'bg-red-950 text-red-400',
      cancelled:    'bg-gray-800 text-gray-500',
      manual_close: 'bg-orange-950 text-orange-400',
    };
    const cls = map[o] || 'bg-gray-800 text-gray-400';
    return `<span class="text-xs px-2 py-0.5 rounded-full ${cls}">${o || 'open'}</span>`;
  }

  // ════════════════════════════════════════════════════════
  //  CONFIG PANEL
  // ════════════════════════════════════════════════════════
  function renderConfig(c) {
    const sl  = (c.stop_loss_pct   || 2);
    const tp  = (c.take_profit_pct || 4);
    const lev = (c.leverage || 1);
    function row(label, val, color) {
      return `<div class="flex justify-between items-center">
        <span class="text-gray-500">${label}</span>
        <span style="color:${color||'#d1d5db'}" class="font-medium text-right">${val}</span>
      </div>`;
    }
    document.getElementById('cfg-panel').innerHTML = [
      row('Mode',          `${(c.trade_mode||'spot').toUpperCase()} ${lev}x`, '#93c5fd'),
      row('Pairs',         (c.pairs||[]).join(', '), '#d1d5db'),
      '<hr style="border-color:#1e1e2e"/>',
      row('Stop Loss',     `-${sl}% → -${(sl*lev).toFixed(0)}% real`, '#f87171'),
      row('Take Profit',   `+${tp}% → +${(tp*lev).toFixed(0)}% real`, '#4ade80'),
      row('R:R ratio',     `${(tp/sl).toFixed(1)} : 1`, '#d1d5db'),
      '<hr style="border-color:#1e1e2e"/>',
      row('Min Confidence',`${c.min_confidence||65}%`, '#fbbf24'),
      row('Max Position',  `${c.max_position_pct||20}% per trade`, '#d1d5db'),
      row('Cycle',         `every ${c.cycle_interval||60}s`, '#d1d5db'),
      row('Daily Loss Limit', `${c.max_daily_loss_pct||-6}%`, '#f87171'),
    ].join('');
  }

  // ════════════════════════════════════════════════════════
  //  CLOSE POSITION
  // ════════════════════════════════════════════════════════
  async function closePosition(pair) {
    if (!confirm(`Close ${pair} at market price?\n\nThis will cancel TP/SL orders and sell immediately.`)) return;
    try {
      const r = await fetch(`/api/close/${pair}`, { method: 'POST' });
      const d = await r.json();
      if (d.success) {
        alert(`✅ ${pair} closed\nOrder ID: ${d.orderId}`);
        fetchStatus();
      } else {
        alert(`❌ Close failed\n${d.message}`);
      }
    } catch(e) { alert('Network error: ' + e.message); }
  }

  async function cancelDry(tradeId) {
    if (!confirm('Cancel this dry-run trade?')) return;
    try {
      const r = await fetch(`/api/cancel-dry/${tradeId}`, { method: 'POST' });
      const d = await r.json();
      if (d.success) { fetchStatus(); }
      else alert('Failed: ' + d.message);
    } catch(e) { alert('Error: ' + e.message); }
  }

  // ════════════════════════════════════════════════════════
  //  LIVE LOG WEBSOCKET
  // ════════════════════════════════════════════════════════
  let ws = null;

  function connectWS() {
    const badge = document.getElementById('ws-badge');
    try {
      ws = new WebSocket(`ws://${location.host}/ws/logs`);
      ws.onopen = () => {
        badge.textContent = '● Connected';
        badge.className = 'text-xs px-2 py-1 rounded-full bg-green-950 text-green-400';
      };
      ws.onmessage = e => appendLog(e.data);
      ws.onclose  = () => {
        badge.textContent = '● Disconnected';
        badge.className = 'text-xs px-2 py-1 rounded-full bg-red-950 text-red-400';
        setTimeout(connectWS, 3000);
      };
      ws.onerror = () => ws.close();
    } catch(e) { setTimeout(connectWS, 3000); }
  }

  function appendLog(line) {
    const box = document.getElementById('log-box');
    const el  = document.createElement('div');
    el.className = 'log-line ' + logColor(line);
    el.textContent = line;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    while (box.children.length > 500)
      box.removeChild(box.firstChild);
  }

  function logColor(l) {
    if (l.includes('ERROR') || l.includes('❌'))   return 'text-red-400';
    if (l.includes('WARNING'))                      return 'text-yellow-400';
    if (l.includes('✅') || l.includes('WIN'))      return 'text-green-400';
    if (l.includes('DRY RUN'))                      return 'text-yellow-300';
    if (l.includes('🔄 CYCLE'))                     return 'text-blue-400';
    if (l.includes('⏭'))                            return 'text-gray-500';
    return 'text-gray-400';
  }

  function clearLogs() {
    document.getElementById('log-box').innerHTML = '';
  }

  // ════════════════════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════════════════════
  function fmt(v) {
    const n = parseFloat(v || 0);
    if (n === 0) return '<span class="text-gray-600">—</span>';
    if (n > 100)  return '$' + n.toLocaleString(undefined, {maximumFractionDigits: 2});
    if (n > 1)    return '$' + n.toFixed(4);
    return '$' + n.toFixed(6);
  }

  // ════════════════════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════════════════════
  fetchStatus();
  setInterval(fetchStatus, 5000);
  connectWS();
  </script>
</body>
</html>
